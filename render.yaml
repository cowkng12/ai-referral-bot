services:
  - type: web
    name: ai-referral-bot
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run render:start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STATE_TABLE
        value: app_state
      - key: SUPABASE_STATE_KEY
        value: bot
      - key: SHOP_URL
        value: https://t.me/OminiKey_bot
      - key: SUPPORT_URL
        value: https://t.me/OmniKeySUPPORT
      - key: MAIN_CHANNEL_URL
        value: https://t.me/Omni_Key
      - key: MAIN_CHANNEL_USERNAME
        value: '@Omni_Key'
